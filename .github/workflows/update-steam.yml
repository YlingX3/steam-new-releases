name: Update Steam report

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1 * * *"
  push:
    paths:
      - ".github/workflows/update-steam.yml"
      - "generate_report.py"

permissions:
  contents: write

concurrency:
  group: update-steam-report
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync main
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate report
        run: python generate_report.py

      - name: Commit report changes
        run: |
          if [ -z "$(git status --porcelain latest.html latest.json detail_cache.json run.log)" ]; then
            echo "No report changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.html latest.json detail_cache.json run.log
          git commit -m "Update Steam report"
          git pull --rebase --strategy-option=theirs origin main
          git push origin HEAD:main
